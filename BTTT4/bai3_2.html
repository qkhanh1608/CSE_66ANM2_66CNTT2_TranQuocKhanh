<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Multi Step Form</title>
<style>
body{
    font-family: Arial;
    display:flex;
    justify-content:center;
    margin-top:40px;
}

.form-box{
    width:400px;
}

.step{
    display:none;
}

.step.active{
    display:block;
}

.progress{
    width:100%;
    height:10px;
    background:#ddd;
    margin-bottom:20px;
}

.progress-bar{
    height:100%;
    width:33%;
    background:green;
}

button{
    margin-top:10px;
}
</style>
</head>

<body>

<div class="form-box">

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>

<form id="form">

<!-- Step 1 -->
<div class="step active">
<h3>Bước 1: Thông tin cá nhân</h3>

<label>Họ tên</label><br>
<input type="text" id="name"><br><br>

<label>Ngày sinh</label><br>
<input type="date" id="birth"><br><br>

<label>Giới tính</label><br>
<select id="gender">
<option value="">Chọn</option>
<option>Nam</option>
<option>Nữ</option>
</select><br>

<button type="button" onclick="nextStep()">Tiếp theo</button>
</div>

<!-- Step 2 -->
<div class="step">
<h3>Bước 2: Thông tin tài khoản</h3>

<label>Email</label><br>
<input type="email" id="email"><br><br>

<label>Mật khẩu</label><br>
<input type="password" id="pass"><br><br>

<label>Xác nhận mật khẩu</label><br>
<input type="password" id="repass"><br>

<button type="button" onclick="prevStep()">Quay lại</button>
<button type="button" onclick="nextStep()">Tiếp theo</button>
</div>

<!-- Step 3 -->
<div class="step">
<h3>Bước 3: Xác nhận</h3>

<p id="confirm"></p>

<button type="button" onclick="prevStep()">Quay lại</button>
<button type="submit">Đăng ký</button>
</div>

</form>

</div>

<script>

let currentStep = 0
let steps = document.querySelectorAll(".step")
let progress = document.getElementById("progressBar")

function showStep(index){
steps.forEach(step=>step.classList.remove("active"))
steps[index].classList.add("active")

progress.style.width = ((index+1)/steps.length*100) + "%"
}

function validateStep(){

if(currentStep==0){
let name = document.getElementById("name").value
let birth = document.getElementById("birth").value
let gender = document.getElementById("gender").value

if(name=="" || birth=="" || gender==""){
alert("Vui lòng nhập đầy đủ")
return false
}
}

if(currentStep==1){
let email = document.getElementById("email").value
let pass = document.getElementById("pass").value
let repass = document.getElementById("repass").value

if(email=="" || pass=="" || repass==""){
alert("Vui lòng nhập đầy đủ")
return false
}

if(pass!=repass){
alert("Mật khẩu không khớp")
return false
}
}

return true
}

function nextStep(){

if(!validateStep()) return

currentStep++

if(currentStep==2){
document.getElementById("confirm").innerHTML =
"Họ tên: "+document.getElementById("name").value+"<br>"+
"Ngày sinh: "+document.getElementById("birth").value+"<br>"+
"Giới tính: "+document.getElementById("gender").value+"<br>"+
"Email: "+document.getElementById("email").value
}

showStep(currentStep)
}

function prevStep(){
currentStep--
showStep(currentStep)
}

</script>

</body>
</html>
