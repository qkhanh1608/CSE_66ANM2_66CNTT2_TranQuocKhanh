<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đăng Ký</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

form{
    width:400px;
}

input{
    width:100%;
    padding:6px;
    margin-top:4px;
}

.error{
    color:red;
    font-size:13px;
}

.success{
    font-size:20px;
    color:green;
}
</style>
</head>

<body>

<h2>Đăng Ký Tài Khoản</h2>

<form id="registerForm">

<label>Họ và tên</label>
<input id="fullname">
<div class="error" id="fullnameError"></div>

<label>Email</label>
<input id="email">
<div class="error" id="emailError"></div>

<label>Số điện thoại</label>
<input id="phone">
<div class="error" id="phoneError"></div>

<label>Mật khẩu</label>
<input type="password" id="password">
<div class="error" id="passwordError"></div>

<label>Xác nhận mật khẩu</label>
<input type="password" id="confirmPassword">
<div class="error" id="confirmError"></div>

<br><br>

<label>Giới tính</label><br>
<input type="radio" name="gender" value="Nam"> Nam
<input type="radio" name="gender" value="Nữ"> Nữ
<div class="error" id="genderError"></div>

<br><br>

<label>
<input type="checkbox" id="terms"> Tôi đồng ý điều khoản
</label>
<div class="error" id="termsError"></div>

<br><br>

<button type="submit">Đăng ký</button>

</form>

<div id="successMessage"></div>

<script>

function showError(id,message){
    document.getElementById(id+"Error").innerText=message
}

function clearError(id){
    document.getElementById(id+"Error").innerText=""
}

function validateFullname(){

    let value=document.getElementById("fullname").value.trim()
    let regex=/^[A-Za-zÀ-ỹ\s]{3,}$/

    if(!regex.test(value)){
        showError("fullname","Tên không hợp lệ")
        return false
    }

    clearError("fullname")
    return true
}

function validateEmail(){

    let value=document.getElementById("email").value
    let regex=/^[^\s@]+@[^\s@]+\.[^\s@]+$/

    if(!regex.test(value)){
        showError("email","Email không hợp lệ")
        return false
    }

    clearError("email")
    return true
}

function validatePhone(){

    let value=document.getElementById("phone").value
    let regex=/^0\d{9}$/

    if(!regex.test(value)){
        showError("phone","Số điện thoại không hợp lệ")
        return false
    }

    clearError("phone")
    return true
}

function validatePassword(){

    let value=document.getElementById("password").value
    let regex=/^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/

    if(!regex.test(value)){
        showError("password","Mật khẩu yếu")
        return false
    }

    clearError("password")
    return true
}

function validateConfirm(){

    let pass=document.getElementById("password").value
    let confirm=document.getElementById("confirmPassword").value

    if(pass!==confirm){
        showError("confirm","Mật khẩu không khớp")
        return false
    }

    clearError("confirm")
    return true
}

function validateGender(){

    let gender=document.querySelector("input[name='gender']:checked")

    if(!gender){
        showError("gender","Chọn giới tính")
        return false
    }

    clearError("gender")
    return true
}

function validateTerms(){

    let terms=document.getElementById("terms").checked

    if(!terms){
        showError("terms","Phải đồng ý điều khoản")
        return false
    }

    clearError("terms")
    return true
}

document.getElementById("registerForm").addEventListener("submit",function(e){

    e.preventDefault()

    let valid =
    validateFullname() &
    validateEmail() &
    validatePhone() &
    validatePassword() &
    validateConfirm() &
    validateGender() &
    validateTerms()

    if(valid){

        let name=document.getElementById("fullname").value

        this.style.display="none"

        document.getElementById("successMessage").innerHTML=
        `<div class="success">Đăng ký thành công! 🎉<br>Chào ${name}</div>`
    }

})

document.getElementById("fullname").addEventListener("blur",validateFullname)
document.getElementById("email").addEventListener("blur",validateEmail)
document.getElementById("phone").addEventListener("blur",validatePhone)
document.getElementById("password").addEventListener("blur",validatePassword)
document.getElementById("confirmPassword").addEventListener("blur",validateConfirm)

document.querySelectorAll("input").forEach(input=>{
    input.addEventListener("input",function(){
        let id=this.id
        if(id) clearError(id)
    })
})

</script>

</body>
</html>
