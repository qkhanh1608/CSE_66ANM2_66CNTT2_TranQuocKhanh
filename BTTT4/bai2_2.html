<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Form Đặt Hàng</title>

<style>
body{
    font-family: Arial;
    margin:40px;
}

form{
    width:420px;
}

input,select,textarea{
    width:100%;
    padding:6px;
    margin-top:4px;
}

textarea{
    height:80px;
}

.error{
    color:red;
    font-size:13px;
}

#charCount{
    font-size:13px;
}

.red{
    color:red;
}

#confirmBox{
    border:1px solid #ccc;
    padding:15px;
    margin-top:20px;
    display:none;
}
</style>
</head>

<body>

<h2>Đặt Hàng</h2>

<form id="orderForm">

<label>Tên sản phẩm</label>
<select id="product">
<option value="">-- Chọn sản phẩm --</option>
<option value="Áo">Áo</option>
<option value="Quần">Quần</option>
<option value="Giày">Giày</option>
</select>
<div class="error" id="productError"></div>

<label>Số lượng</label>
<input type="number" id="quantity">
<div class="error" id="quantityError"></div>

<label>Ngày giao hàng</label>
<input type="date" id="date">
<div class="error" id="dateError"></div>

<label>Địa chỉ giao</label>
<input id="address">
<div class="error" id="addressError"></div>

<label>Ghi chú</label>
<textarea id="note"></textarea>
<div id="charCount">0/200</div>
<div class="error" id="noteError"></div>

<label>Thanh toán</label><br>
<input type="radio" name="pay" value="COD"> COD
<input type="radio" name="pay" value="Bank"> Chuyển khoản
<input type="radio" name="pay" value="Wallet"> Ví điện tử
<div class="error" id="payError"></div>

<br><br>

<div>
Tổng tiền: <b id="total">0</b> VNĐ
</div>

<br>

<button type="submit">Đặt hàng</button>

</form>

<div id="confirmBox">
<h3>Xác nhận đơn hàng</h3>
<div id="summary"></div>
<br>
<button id="confirmBtn">Xác nhận</button>
<button id="cancelBtn">Hủy</button>
</div>

<div id="success"></div>

<script>

const prices={
    "Áo":150000,
    "Quần":200000,
    "Giày":500000
}

function showError(id,msg){
    document.getElementById(id+"Error").innerText=msg
}

function clearError(id){
    document.getElementById(id+"Error").innerText=""
}

function validateProduct(){

    let v=document.getElementById("product").value

    if(v===""){
        showError("product","Chọn sản phẩm")
        return false
    }

    clearError("product")
    return true
}

function validateQuantity(){

    let q=document.getElementById("quantity").value

    if(q<1 || q>99){
        showError("quantity","1-99")
        return false
    }

    clearError("quantity")
    return true
}

function validateDate(){

    let d=new Date(document.getElementById("date").value)

    let today=new Date()

    let max=new Date()
    max.setDate(today.getDate()+30)

    if(d<today || d>max){
        showError("date","Ngày không hợp lệ")
        return false
    }

    clearError("date")
    return true
}

function validateAddress(){

    let a=document.getElementById("address").value.trim()

    if(a.length<10){
        showError("address","≥ 10 ký tự")
        return false
    }

    clearError("address")
    return true
}

function validateNote(){

    let n=document.getElementById("note").value

    if(n.length>200){
        showError("note","Quá 200 ký tự")
        return false
    }

    clearError("note")
    return true
}

function validatePay(){

    let p=document.querySelector("input[name='pay']:checked")

    if(!p){
        showError("pay","Chọn phương thức")
        return false
    }

    clearError("pay")
    return true
}

function updateTotal(){

    let p=document.getElementById("product").value
    let q=document.getElementById("quantity").value

    if(prices[p] && q){

        let total=prices[p]*q

        document.getElementById("total").innerText=
        Number(total).toLocaleString("vi-VN")
    }
}

document.getElementById("product").addEventListener("change",updateTotal)
document.getElementById("quantity").addEventListener("input",updateTotal)

document.getElementById("note").addEventListener("input",function(){

    let len=this.value.length

    let counter=document.getElementById("charCount")

    counter.innerText=len+"/200"

    if(len>200){
        counter.classList.add("red")
    }else{
        counter.classList.remove("red")
    }

})

document.getElementById("orderForm").addEventListener("submit",function(e){

    e.preventDefault()

    let valid=
    validateProduct() &
    validateQuantity() &
    validateDate() &
    validateAddress() &
    validateNote() &
    validatePay()

    if(valid){

        let p=document.getElementById("product").value
        let q=document.getElementById("quantity").value
        let d=document.getElementById("date").value
        let total=document.getElementById("total").innerText

        document.getElementById("summary").innerHTML=
        `
        Sản phẩm: ${p}<br>
        Số lượng: ${q}<br>
        Tổng tiền: ${total} VNĐ<br>
        Ngày giao: ${d}
        `

        document.getElementById("confirmBox").style.display="block"
    }

})

document.getElementById("confirmBtn").onclick=function(){

    document.getElementById("confirmBox").style.display="none"

    document.getElementById("orderForm").style.display="none"

    document.getElementById("success").innerHTML=
    "<h3>Đặt hàng thành công 🎉</h3>"
}

document.getElementById("cancelBtn").onclick=function(){

    document.getElementById("confirmBox").style.display="none"

}

</script>

</body>
</html>
