<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>BÀI TẬP 02 - Landing Page</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav>
            <a href="#">Destination</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-content">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
                <button class="btn-discover">Discover places</button>
            </div>
        </section>

        <section class="highlights">
            <h2>HIGHLIGHTS</h2>
            <div class="card-container">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?w=400" alt="Miami">
                    <p class="city-info">MIAMI <span class="country">USA</span></p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1467269204594-9661b134dd2b?w=400" alt="Munich">
                    <p class="city-info">MUNICH <span class="country">GERMANY</span></p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1539109136881-3be0616acf4b?w=400" alt="Barcelona">
                    <p class="city-info">BARCELONA <span class="country">SPAIN</span></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <i class="fa-brands fa-instagram"></i>
            <i class="fa-brands fa-facebook-f"></i>
        </div>
    </footer>

</body>
</html>
