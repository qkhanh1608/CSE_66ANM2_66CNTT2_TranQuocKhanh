<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Contact Form - Flexbox</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="form-container">
        <h3>Get in touch with us by filling contact form below</h3>
        
        <form>
            <div class="form-row">
                <input type="text" placeholder="* Enter your full name" class="flex-50">
                <input type="email" placeholder="* Enter your email address" class="flex-50">
            </div>

            <div class="form-row">
                <input type="text" placeholder="Enter your subject" class="flex-100">
            </div>

            <div class="form-row">
                <textarea placeholder="* Your message here..." class="flex-100"></textarea>
            </div>

            <div class="form-footer">
                <button type="submit">Send message</button>
                <span>* Please fill all required form field, thanks!</span>
            </div>
        </form>
    </div>

</body>
</html>
